# === NOUVELLES INTENT RULES ===

nouvelles_intent_rules:
  - id: pacing_question
    description: L'utilisateur pose une question sur l'allure ou le pacing
    concepts:
      - gestion-course/strategies-pacing
      - gestion-course/gestion-allure-rpe-fc
    priority: high
  - id: ravitaillement_course
    description: L'utilisateur demande quoi manger/boire pendant une course
    concepts:
      - gestion-course/ravitaillement-course
      - nutrition/glucides-timing
      - nutrition/hydratation-electrolytes
    priority: high
  - id: course_conditions
    description: L'utilisateur s'interroge sur la course par conditions specifiques (chaud, froid, pluie, altitude)
    concepts:
      - gestion-course/conditions-specifiques-course
      - environnement/chaleur
      - environnement/froid
    priority: high
  - id: force_endurance
    description: L'utilisateur pose des questions sur la musculation/force pour la course
    concepts:
      - force-pour-coureur/fondamentaux-force
      - force-pour-coureur/renforcement-charge-lourde
      - force-pour-coureur/plyometrie-coureur
    priority: high
  - id: periodisation_force
    description: L'utilisateur demande quand et comment integrer la force dans son plan
    concepts:
      - force-pour-coureur/periodisation-force
      - planification/modeles-periodisation
    priority: medium
  - id: mental_avance
    description: L'utilisateur veut des techniques mentales avancees (imagerie, flow, routines)
    concepts:
      - preparation-mentale/imagerie-visualisation
      - preparation-mentale/routines-pre-competition
      - preparation-mentale/flow-state-course
    priority: medium
  - id: gestion_echec_resilience
    description: L'utilisateur parle d'echec, de contre-performance, de DNF
    concepts:
      - preparation-mentale/resilience-gestion-echec
      - psychologie/resilience-ennui-plateaux
    priority: high
  - id: condition_medicale_sport
    description: L'utilisateur a une condition medicale (asthme, diabete, anemie) et veut faire du sport
    concepts:
      - populations/athletes-conditions-medicales
      - physiologie/frequence-cardiaque-hrv
    priority: high
  - id: pollution_qualite_air
    description: L'utilisateur s'inquiete de la qualite de l'air pour courir en ville
    concepts:
      - environnement/pollution-qualite-air
      - environnement/chaleur
    priority: medium
  - id: decalage_horaire
    description: L'utilisateur voyage pour une competition
    concepts:
      - environnement/decalage-horaire-chronobiologie
      - planification/tapering-pic-forme
    priority: medium
  - id: humidite_wbgt
    description: L'utilisateur demande comment gerer l'humidite ou le WBGT
    concepts:
      - environnement/humidite-point-rosee
      - environnement/chaleur
    priority: medium

