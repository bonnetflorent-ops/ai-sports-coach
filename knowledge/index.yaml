# =============================================================================
# INDEX DE LA BASE DE CONNAISSANCES — AI Sports Coach
# =============================================================================
# Version: 1.0
# Généré le: 2026-05-12
# Fichiers source: 7 domaines × ~2400 lignes de contenu scientifique
#
# UTILISATION:
#   Cet index est la source unique pour le sélecteur LLM.
#   À chaque message utilisateur, le sélecteur lit la question + le profil,
#   puis retourne les `id` des 2-4 concepts les plus pertinents.
#   Le prompt builder charge ensuite les lignes correspondantes dans les
#   fichiers markdown pour le niveau cible.
#
# CONVENTION DE NOMMAGE DES ID: <domaine>/<slug-concept>
#   Exemple: physiologie/systemes-energetiques
#
# DOMAINES:
#   physiologie  → Physiologie de l'effort
#   planification → Planification & périodisation
#   seances     → Séances types par filière énergétique
#   recuperation → Récupération & adaptation
#   blessures   → Blessures & prévention
#   nutrition   → Nutrition sportive
#   psychologie → Psychologie & mental
# =============================================================================

version: "1.0"
