# =============================================================================
# MAPPING DES INTENTIONS UTILISATEUR → CONCEPTS
# Utilisé en fallback si le LLM classifieur échoue
# =============================================================================
intent_rules:
  fatigue_surentrainement:
    description: "L'utilisateur se sent fatigué, épuisé, pas en forme"
    concepts:
      - recuperation/surcompensation-surentrainement
      - recuperation/sommeil
      - recuperation/outils-monitoring
      - psychologie/gestion-effort-rpe
    priority: high

  planifier_saison:
    description: "L'utilisateur veut organiser son entraînement sur plusieurs mois"
    concepts:
      - planification/modeles-periodisation
      - planification/structure-temporelle
      - planification/tapering-pic-forme
    priority: medium

  ameliorer_performance:
    description: "L'utilisateur veut progresser en vitesse/puissance/endurance"
    concepts:
      - seances/intervalles-haute-intensite
      - seances/travail-seuil
      - physiologie/vo2max-seuils
    priority: medium

  gerer_nutrition:
    description: "Questions sur quoi manger, quand, combien"
    concepts:
      - nutrition/glucides-timing
      - nutrition/proteines-besoins
      - nutrition/hydratation-electrolytes
      - nutrition/periodisation-nutritionnelle
      - recuperation/nutrition-recuperation
    priority: medium

  blessure_douleur:
    description: "L'utilisateur signale une douleur ou une blessure"
    concepts:
      - blessures/cyclisme
      - blessures/running
      - blessures/fitness-musculation
    priority: critical

  sommeil_recuperation:
    description: "Questions sur le sommeil, la récupération"
    concepts:
      - recuperation/sommeil
      - recuperation/outils-monitoring
      - physiologie/frequence-cardiaque-hrv
    priority: medium

  motivation_mental:
    description: "Baisse de motivation, blocage mental, difficulté à s'engager"
    concepts:
      - psychologie/motivation-autodetermination
      - psychologie/fixation-objectifs
      - psychologie/resilience-ennui-plateaux
    priority: high

  debutant_decouverte:
    description: "L'utilisateur débute, veut comprendre les bases"
    concepts:
      - physiologie/systemes-energetiques
      - planification/modeles-periodisation
      - seances/endurance-fondamentale
    priority: medium

