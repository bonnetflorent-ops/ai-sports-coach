services:
  # ── Backend FastAPI ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    restart: unless-stopped
    labels:
      # Domaine principal: api.sport-assistant.app
      - traefik.enable=true
      - traefik.http.routers.pwa-api.rule=Host(`api.sport-assistant.app`)
      - traefik.http.routers.pwa-api.entrypoints=websecure
      - traefik.http.routers.pwa-api.tls.certresolver=letsencrypt
      - traefik.http.services.pwa-api.loadbalancer.server.port=8000
      # Fallback Hostinger: pwa-api.srv780916.hstgr.cloud
      - traefik.http.routers.pwa-api-hstgr.rule=Host(`pwa-api.srv780916.hstgr.cloud`)
      - traefik.http.routers.pwa-api-hstgr.entrypoints=websecure
      - traefik.http.routers.pwa-api-hstgr.tls.certresolver=letsencrypt
      - traefik.http.routers.pwa-api-hstgr.service=pwa-api

  # ── Frontend Next.js PWA ────────────────────────────
